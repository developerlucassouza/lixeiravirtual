<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Tag &ltspan&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltspan&gt HTML</h1>
        <p>A tag <code>span</code> é uma tag de agrupamento semelhante a <code><a href="div.html">&ltdiv&gt</a></code> com a diferença de que <code><a href="div.html">&ltdiv&gt</a></code> é uma tag <code>block</code>, enquanto <code>span</code> é uma tag <code>inline</code>.</p>
        <p>Por ser uma tag de agrupamento, não possui estilo prórpio.</p>

        <div class="code">
            <pre>
&ltp&gtEsse parágrafo possui &ltspan&gt uma tag span &lt/span&gt &lt/p&gt   </pre>
        </div>
    </main>
    
</body>
