<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltq&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltq&gt HTML</h1>
        <p>A tag <code>q</code> é utilizada para criar citações.</p>

        <div class="code">
            <pre>
&ltp&gtComo diria Descartes: &ltq&gtPenso, logo existo!&lt/q&gt.&lt/p&gt   </pre>
        </div>

        <p>Como diria Descartes: <q>Penso, logo existo</q>.</p>

        <p>Perceba também que as aspas são colocadas automaticamente.</p>
    </main>
    
</body>
</html>

<script src="../../scripts/elementos_auto.js"></script>
<script src="../../scripts/pesquisa.js"></script>
<script src="../../scripts/html.js"></script>
