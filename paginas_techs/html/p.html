<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltp&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltp&gt HTML</h1>
        <p>A tag <code>p</code> indica um parágrafo no documento.</p>
        <p><code>p</code> auxilia ao criar espaçamentos entre parágrafos, adicionar indentação, estruturar o código, etc.</p>
        <p>É uma das tags principais do HTML e umas das primeiras a ser aprendida.</p>

        <div class="code">
            <pre>
&ltp&gtEsse é um parágrafo.&lt/p&gt   </pre>
        </div>

        <p>Esse é um parágrafo.</p>
    </main>
    
</body>
</html>
