<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltstrong&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltstrong&gt HTML</h1>
        <p>A tag <code>strong</code> é a forma semântica de colocar um texto em negrito. Sua semântica indica um trecho mais forte do texto.</p>

        <div class="code">
            <pre>
&ltp&gtA tag strong é usada como &ltstrong&gtnegrito&lt/strong&gt.&lt/p&gt   </pre>
        </div>

        <p>A tag strong é usada como <strong>negrito</strong>.</p>
    </main>
