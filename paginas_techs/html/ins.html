<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltins&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltins&gt HTML</h1>
        <p>A tag <code>ins</code> é a forma semântica do sublinhado. Ele indica um texto que foi inserido no documento.</p>

        <div class="code">
            <pre>
&ltins&gtEsse texto foi inserido.&lt/ins&gt   </pre>
        </div>

        <ins style="margin-left:20px;">Esse texto foi inserido</ins>
    </main>
    
</body>
</html>

<script src="../../scripts/elementos_auto.js"></script>
<script src="../../scripts/pesquisa.js"></script>
<script src="../../scripts/html.js"></script>
