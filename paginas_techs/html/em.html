<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltem&gt HTML</title>

</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltem&gt HTML</h1>
        <p>A tag <code>em</code> é a tag semântica para indicar ênfase em um texto. Também é a tag para uso do texto itálico. <code>em</code> pode ser aninhado, com cada nivel de aninhamento indicando um nível cada vez maior de ênfase.</p>

        <div class="code">
            <pre>
&ltem&gtTexto em itálico.&lt/em&gt   </pre>
        </div>

        <em style="margin-left:20px;">Texto em itálico.</em>
    </main>
    
</body>
