<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltaddress&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltaddress&gt HTML</h1>
        <p>A tag <code>address</code> é utilizada para indicar uma informação de contato, incluindo endereço físico, URL, email, telefone, mídia social, coordenadas geográficas, etc.</p>

        <div class="code">
            <pre>
&ltaddress style="margin-left:20px;"&gtRua Joaquim Pereira, 123&lt/address&gt   </pre>
        </div>

        <address style="margin-left:20px;">Rua Joaquim Pereira, 123</address>
    </main>
    
</body>
</html>

<script src="../../scripts/elementos_auto.js"></script>
