    <title>Tag &ltaudio&gt HTML</title>

<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltaudio&gt HTML</h1>
        <p>A tag <code>audio</code> serve para adicionar um áudio ao seu site. Utilize o parâmetro <code>src</code> para indicar o caminho do áudio, e adicione na tag a propriedade <code>controls</code> para mostrar os controle do audio.</p>

        <div class="code">
            <pre>
&ltaudio src="" controls&gt&lt/audio&gt   </pre>
        </div>

        <audio src="" controls style="margin-left:20px;"></audio>
    </main>
    
</body>
