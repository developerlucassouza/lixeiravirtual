<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltfooter&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltfooter&gt HTML</h1>
        <p>A tag <code>footer</code> é uma tag de agrupamento que indica o rodapé de um site. A tag <code>footer</code> é semelhante as tags <code><a href="main.html">&ltmain&gt</a></code> e <code><a href="header.html">&ltheader&gt</a></code>. <code>footer</code> não possui estilo padrão.</p>

        <div class="code">
            <pre>
&ltfooter&gtRodapé do Site&lt/footer&gt   </pre>
        </div>

        <footer style="margin-left:20px;">Rodapé do Site</footer>
    </main>
    
</body>
</html>
