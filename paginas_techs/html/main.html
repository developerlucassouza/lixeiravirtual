<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag &ltmain&gt HTML</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <header>
        <span class="material-symbols-outlined" id="burguer" onclick="clickHamb()">menu</span>
    </header>

    <div id="itens"></div>

    <form id="pesquisa" autocomplete="off">
        <input type="text" id="tpesquisa" placeholder="Pesquisar">
        <input type="button" id="bpesquisa" value="_" onclick="pesquisar()">
    </form> 

    <main id="tech">
        <h1>Tag &ltmain&gt HTML</h1>
        <p>A tag <code>main</code> é uma tag de agrupamento semântica que indica o conteúdo principal do seu documento. Essa tag não possui estilo padrão.</p>

        <div class="code">
            <pre>
&ltmain>
    &lth1>Olá, Mundo!&lt/h1>
    &ltp>Lorem ipsum dolor sit amet consectetur adipisicing elit. &lt/p>   
&lt/main></pre>
        </div>
    </main>
    
</body>
</html>
